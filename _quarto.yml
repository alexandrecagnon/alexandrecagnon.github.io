project:
  type: website
  output-dir: docs
  # Copied into docs/ on every render so custom domain and CV are not wiped by quarto render
  resources:
    - CNAME
    - "cv/alexandre_cagnon_cv_eng.pdf"
  # Authoring docs live in docs/ (Markdown for humans); do not publish them as site pages
  render:
    - "*.qmd"
    - "posts/**/*"

execute:
  freeze: auto

website:
  title: "Alexandre Cagnon"
  # Set when publishing (see docs/github-pages-public-repo.md and docs/custom-domain.md)
  site-url: https://alexandrecagnon.github.io/
  navbar:
    left:
      - text: Home
        href: index.qmd
      - text: About
        href: about.qmd
      - text: Blog
        href: blog.qmd
  page-footer:
    center: "© 2026 Alexandre Cagnon · Code under [MIT](https://opensource.org/licenses/MIT) · Content under [CC BY-NC-ND 4.0](https://creativecommons.org/licenses/by-nc-nd/4.0/) · [Disclaimer](/disclaimer.html) · [Privacy](/privacy.html) · [Corrections](/corrections.html)"

format:
  html:
    theme: flatly
    toc: true
    toc-location: right
